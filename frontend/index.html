<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>AI Tutor — Chloe</title>
  <link rel="icon" href="data:,">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #07070f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    #scene-wrap {
      position: relative;
      width: 720px;
      height: 520px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(60, 100, 255, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    #overlay-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.5) 0%, transparent 100%);
    }

    #live-dot {
      width: 8px;
      height: 8px;
      background: #ff3333;
      border-radius: 50%;
      animation: blink-dot 1.4s ease-in-out infinite;
    }

    @keyframes blink-dot {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    #channel-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
    }

    #nameplate {
      position: absolute;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(5, 5, 20, 0.82);
      border: 1px solid rgba(80, 110, 255, 0.35);
      border-radius: 8px;
      padding: 7px 28px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    #nameplate .n {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    #nameplate .t {
      font-size: 10px;
      color: #7788ff;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-top: 3px;
    }

    #controls {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      width: 720px;
    }

    #text-input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid rgba(80, 110, 255, 0.2);
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }

    #text-input:focus {
      border-color: rgba(80, 110, 255, 0.55);
    }

    #speak-btn {
      padding: 14px 30px;
      background: #4455ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #speak-btn:hover {
      background: #3344dd;
    }

    #speak-btn:active {
      transform: scale(0.97);
    }

    #speak-btn:disabled {
      background: #1e1e2e;
      color: #555;
      cursor: not-allowed;
    }

    #mic-btn {
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(80, 110, 255, 0.25);
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #mic-btn:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    #mic-btn.recording {
      background: #ff3355;
      border-color: #ff3355;
      animation: mic-pulse 1s ease-in-out infinite;
    }

    @keyframes mic-pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(255, 51, 85, 0.5);
      }

      50% {
        box-shadow: 0 0 0 10px rgba(255, 51, 85, 0);
      }
    }

    #live-btn {
      margin-left: auto;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(80, 110, 255, 0.25);
      border-radius: 10px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    #live-btn:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    #live-btn.active {
      background: #ff3355;
      border-color: #ff3355;
      animation: mic-pulse 1.4s ease-in-out infinite;
    }

    #transcript-panel {
      margin-top: 14px;
      width: 720px;
      max-height: 220px;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(80, 110, 255, 0.15);
      border-radius: 12px;
      padding: 12px;
    }

    #transcript-messages {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 75%;
      padding: 8px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.4;
    }

    .msg-user {
      align-self: flex-end;
      background: #4455ff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-chloe {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.08);
      color: #eee;
      border-bottom-left-radius: 4px;
    }

    #bottom-bar {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      width: 720px;
    }

    #status {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      flex: 1;
    }

    #waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #waveform.active {
      opacity: 1;
    }

    #waveform span {
      display: inline-block;
      width: 3px;
      border-radius: 3px;
      background: #4455ff;
      animation: wv 0.7s ease-in-out infinite;
    }

    #waveform span:nth-child(1) {
      animation-delay: 0.0s
    }

    #waveform span:nth-child(2) {
      animation-delay: 0.1s
    }

    #waveform span:nth-child(3) {
      animation-delay: 0.2s
    }

    #waveform span:nth-child(4) {
      animation-delay: 0.12s
    }

    #waveform span:nth-child(5) {
      animation-delay: 0.05s
    }

    @keyframes wv {

      0%,
      100% {
        height: 3px
      }

      50% {
        height: 18px
      }
    }
  </style>
</head>

<body>
  <div id="scene-wrap">
    <div id="overlay-top">
      <div id="live-dot"></div>
      <span id="channel-label">AI Tutor Live</span>
    </div>
    <div id="nameplate">
      <div class="n">CHLOE</div>
      <div class="t">AI Learning Assistant</div>
    </div>
  </div>
  <div id="controls">
    <input id="text-input" type="text" placeholder="Ask Chloe anything..." />
    <button id="mic-btn" title="Hold to talk">&#127908;</button>
    <button id="speak-btn">&#9654; Speak</button>
  </div>
  <div id="bottom-bar">
    <div id="status">Loading Chloe...</div>
    <div id="waveform">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <button id="live-btn">&#128308; Start Live Conversation</button>
  </div>
  <div id="transcript-panel">
    <div id="transcript-messages"></div>
  </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>

    // ════════════════════════════════════════════
    //  RENDERER + SCENE
    // ════════════════════════════════════════════
    const W = 720, H = 520;
    const wrap = document.getElementById("scene-wrap");
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    wrap.prepend(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x07070f);
    scene.fog = new THREE.FogExp2(0x07070f, 0.055);

    const camera = new THREE.PerspectiveCamera(42, W / H, 0.1, 100);
    camera.position.set(0, 0.5, 1.8);
    camera.lookAt(0, 0.6, 0);

    // ════════════════════════════════════════════
    //  STUDIO LIGHTING
    // ════════════════════════════════════════════
    const keyLight = new THREE.SpotLight(0xfff3d0, 2.2, 20, Math.PI * 0.18, 0.3);
    keyLight.position.set(-3.5, 5, 5);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048, 2048);
    keyLight.shadow.bias = -0.0005;
    scene.add(keyLight);
    scene.add(keyLight.target);

    const fillLight = new THREE.DirectionalLight(0x99bbff, 0.55);
    fillLight.position.set(4, 1, 3);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0x8899ff, 1.0);
    rimLight.position.set(0.5, 4, -5);
    scene.add(rimLight);

    scene.add(new THREE.AmbientLight(0x112244, 0.9));

    const bounceLight = new THREE.PointLight(0xffddaa, 0.35, 5);
    bounceLight.position.set(0, -1.8, 2.8);
    scene.add(bounceLight);

    // ════════════════════════════════════════════
    //  ENVIRONMENT
    // ════════════════════════════════════════════
    const desk = new THREE.Mesh(
      new THREE.BoxGeometry(7, 0.1, 2.5),
      new THREE.MeshStandardMaterial({ color: 0x0d0d22, roughness: 0.35, metalness: 0.7 })
    );
    desk.position.set(0, -1.2, 0.4);
    desk.receiveShadow = true;
    scene.add(desk);

    const deskGlow = new THREE.PointLight(0x3355ff, 1.6, 3.5);
    deskGlow.position.set(0, -1.05, 1.4);
    scene.add(deskGlow);

    const wall = new THREE.Mesh(
      new THREE.PlaneGeometry(16, 10),
      new THREE.MeshStandardMaterial({ color: 0x090916, roughness: 1 })
    );
    wall.position.z = -4;
    scene.add(wall);

    for (let i = 0; i < 24; i++) {
      const r = 0.03 + Math.random() * 0.14;
      const b = new THREE.Mesh(
        new THREE.CircleGeometry(r, 24),
        new THREE.MeshBasicMaterial({
          color: [0x2233ff, 0x4455ff, 0x1122bb, 0x6677ff][Math.floor(Math.random() * 4)],
          transparent: true, opacity: 0.05 + Math.random() * 0.09
        })
      );
      b.position.set((Math.random() - 0.5) * 12, (Math.random() - 0.5) * 7, -3.6 + Math.random() * 0.5);
      scene.add(b);
    }

    // ════════════════════════════════════════════
    //  ADVANCED LIP SYNC ENGINE
    // ════════════════════════════════════════════
    // Rhubarb → Oculus/ReadyPlayerMe viseme name map
    const VISEME_REMAP = {
      X: 'viseme_sil', A: 'viseme_aa', B: 'viseme_PP', C: 'viseme_I',
      D: 'viseme_E', E: 'viseme_O', F: 'viseme_U', G: 'viseme_FF', H: 'viseme_TH',
    };

    // Per-phoneme blend: Talking (jaw/mouth open) + Smile (lip spread)
    // Values intentionally go ABOVE 1.0 — this over-drives the morph target
    // past its sculpted maximum so the mouth opens dramatically wider.
    const BLEND_TABLE = {
      X: { t: 0.00, s: 0.00 },   // silence
      A: { t: 1.60, s: 0.20 },   // "father" — full wide open
      B: { t: 0.00, s: 0.00 },   // "p/b/m"  — fully closed
      C: { t: 0.70, s: 1.10 },   // "it"
      D: { t: 0.95, s: 0.55 },   // "said"
      E: { t: 1.35, s: 0.05 },   // "hot"    — wide open round
      F: { t: 0.55, s: 0.00 },   // "too"
      G: { t: 0.35, s: 0.10 },   // "f/v"
      H: { t: 0.45, s: 0.20 },   // "th"
    };

    class LipSyncEngine {
      constructor() {
        this.tgtV = 'X';
        this.cur = { t: 0, s: 0 };
        this.target = { t: 0, s: 0 };
        this.schedule = [];
        this.audio = null;
      }

      _getAt(time) {
        for (const c of this.schedule)
          if (time >= c.start && time < c.end) return c.value;
        return 'X';
      }

      update() {
        let newTgtV = 'X';
        if (this.audio && !this.audio.paused) {
          newTgtV = this._getAt(this.audio.currentTime);
        }
        if (newTgtV !== this.tgtV) {
          this.tgtV = newTgtV;
          this.target = { ...(BLEND_TABLE[newTgtV] || BLEND_TABLE.X) };
        }

        // Snappy attack (mouth opens fast), slightly softer release (closes naturally)
        const speed = (this.target.t > this.cur.t) ? 0.55 : 0.32;
        this.cur.t += (this.target.t - this.cur.t) * speed;
        this.cur.s += (this.target.s - this.cur.s) * speed;

        return this.cur;   // {t, s} — this IS the final, ready-to-use value
      }
    }

    const lipSync = new LipSyncEngine();

    // ════════════════════════════════════════════
    //  GLB AVATAR
    // ════════════════════════════════════════════
    let jawBone = null;
    let neckBone = null;
    let headBone = null;   // mixamorigHead — used for subtle speaking head motion
    let glbModel = null;
    let glbFaceMeshes = [];   // ALL sub-meshes that carry morph targets

    const loader = new THREE.GLTFLoader();

    loader.load(
      "avatar.glb",
      (gltf) => {
        glbModel = gltf.scene;

        // Auto-fit model to scene
        const box = new THREE.Box3().setFromObject(glbModel);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const scale = 1.8 / Math.max(size.x, size.y, size.z);

        glbModel.scale.setScalar(scale);
        glbModel.position.set(
          -center.x * scale,
          -center.y * scale - 0.1,
          -center.z * scale
        );
        scene.add(glbModel);

        // Find bones — search for an actual jaw bone (not the head bone, which tilts entire head)
        let boneNames = [];
        glbModel.traverse(node => {
          if (node.isBone || node.isObject3D) {
            const n = node.name.toLowerCase();
            boneNames.push(node.name);
            // Only match bones explicitly named 'jaw' — never 'head' (that tilts the whole head)
            if (n.includes('jaw') && !n.includes('head')) {
              jawBone = node;
              console.log('✓ Found jaw bone:', node.name);
            }
            if (n === 'mixamorihead' || n.includes('mixamorighea')) {
              headBone = node;
              console.log('✓ Found head bone:', node.name);
            } else if (n === 'mixamorighead') {
              headBone = node;
              console.log('✓ Found head bone:', node.name);
            }
            // Catch mixamorigHead by exact match
            if (node.name === 'mixamorigHead') {
              headBone = node;
            }
            if (n.includes('neck')) {
              neckBone = node;
              console.log('✓ Found neck bone:', node.name);
            }
          }
          if (node.isSkinnedMesh) {
            node.castShadow = true;
            node.receiveShadow = true;
            if (node.morphTargetDictionary && Object.keys(node.morphTargetDictionary).length > 0) {
              glbFaceMeshes.push(node);
              if (glbFaceMeshes.length === 1) {
                console.log('✓ First morph-target mesh:', node.name,
                  '| keys:', Object.keys(node.morphTargetDictionary));
              }
              if (node.material) {
                if (Array.isArray(node.material)) {
                  node.material.forEach(mat => { mat.morphTargets = true; });
                } else {
                  node.material.morphTargets = true;
                }
              }
            }
          }
        });
        // Log all bones so we can pick the right one if needed
        console.log('All bones:', boneNames.filter(n => n).join(', '));

        // ── SHOULDER-UP CAMERA FRAMING ──────────────────────────────
        const halfH = (size.y * scale) / 2;  // half of scaled height
        const wTop = -0.1 + halfH;           // world Y of top of head  ≈ 0.80
        const wBot = -0.1 - halfH;           // world Y of feet         ≈ -1.00
        const wH = wTop - wBot;            // total world height       ≈ 1.80

        // Eye level  ≈ 10% below head top (works for most humanoid proportions)
        const eyeY = wTop - wH * 0.10;     // ≈ 0.620
        // Shoulder    ≈ 73% from bottom
        const shoulderY = wBot + wH * 0.73;     // ≈ 0.314

        // Frame centre is midway between shoulder and eye level
        const frameCY = (eyeY + shoulderY) / 2;               // ≈ 0.467
        const frameHalf = (eyeY - shoulderY) / 2 + wH * 0.06;  // half-height + 6% padding

        const fovRad = camera.fov * Math.PI / 180;
        const camZ = Math.max(frameHalf / Math.tan(fovRad / 2), 0.55);

        camera.position.set(0, 0.60, camZ);
        camera.lookAt(0, eyeY, 0);   // tilt camera upward to look at eyes

        console.log([
          `📐 Model: size=(${size.x.toFixed(2)},${size.y.toFixed(2)},${size.z.toFixed(2)})`,
          `wTop=${wTop.toFixed(3)}  wBot=${wBot.toFixed(3)}`,
          `eyeY=${eyeY.toFixed(3)}  shoulder=${shoulderY.toFixed(3)}  frameCY=${frameCY.toFixed(3)}`,
          `🎥 Camera: pos=(0,${frameCY.toFixed(3)},${camZ.toFixed(3)})  lookAt=(0,${eyeY.toFixed(3)},0)`
        ].join('\n'));

        if (jawBone) {
          document.getElementById("status").textContent = "Larisa ready — type something!";
        } else {
          document.getElementById("status").textContent = "Larisa ready — type something!";
          if (glbFaceMeshes.length > 0) {
            console.log(`✓ ${glbFaceMeshes.length} morph-mesh(es) ready. Talking key: ${'Talking' in glbFaceMeshes[0].morphTargetDictionary}`);
          }
        }
      },
      (xhr) => {
        if (xhr.total > 0) {
          const pct = Math.round(xhr.loaded / xhr.total * 100);
          document.getElementById("status").textContent = `Loading Chloe... ${pct}%`;
        }
      },
      (err) => {
        console.error("GLB load error:", err);
        document.getElementById("status").textContent = "Error loading avatar";
      }
    );

    // ════════════════════════════════════════════
    //  IDLE STATE
    // ════════════════════════════════════════════
    let clock = 0;
    let blinkTimer = 2 + Math.random() * 2;
    let blinkState = 0;   // 0 = open, 1 = closed
    let blinkPhase = 0;   // internal blink curve

    // ════════════════════════════════════════════
    //  ANIMATION LOOP
    // ════════════════════════════════════════════
    function animate() {
      requestAnimationFrame(animate);
      clock += 0.016;

      if (glbModel) {
        // Subtle idle body sway
        glbModel.rotation.y = Math.sin(clock * 0.32) * 0.022;

        const blend = lipSync.update();   // already smoothed — use directly
        const speaking = lipSync.audio && !lipSync.audio.paused;
        const curV = speaking ? lipSync._getAt(lipSync.audio.currentTime) : 'X';
        const tClamped = Math.min(blend.t, 1.0);   // for head-tilt only, not the mouth

        // ── EYE BLINK ──
        blinkTimer -= 0.016;
        if (blinkTimer <= 0) {
          blinkPhase = 1.0;
          blinkTimer = 2.5 + Math.random() * 3.0;  // blink every 2.5-5.5 s
        }
        // blinkPhase: snap shut in 3 frames, open over 6 frames
        blinkPhase = Math.max(0, blinkPhase - 0.12);
        const blinkW = Math.sin(blinkPhase * Math.PI);  // 0 → peak → 0

        // ── HEAD BONE SPEAKING MOTION ──
        // Small downward nod + oscillation makes avatar look like it's really speaking
        if (headBone) {
          const speakTilt = speaking ? tClamped * 0.12 : 0;
          const speakNod = speaking ? Math.sin(clock * 5.5) * 0.025 * tClamped : 0;
          headBone.rotation.x = THREE.MathUtils.lerp(
            headBone.rotation.x,
            speakTilt + speakNod,
            0.12
          );
        }

        // ── NECK LEAN ──
        if (neckBone) {
          neckBone.rotation.x = THREE.MathUtils.lerp(
            neckBone.rotation.x, speaking ? 0.04 : 0.0, 0.05
          );
        }

        // ── MORPH TARGETS (apply to ALL sub-meshes — only face-material ones have real displacements) ──
        if (glbFaceMeshes.length > 0) {
          const tgtName = VISEME_REMAP[curV] || 'viseme_sil';

          for (const mesh of glbFaceMeshes) {
            const dict = mesh.morphTargetDictionary;
            const infl = mesh.morphTargetInfluences;
            const LERP = 0.50;  // fast transitions = natural speech rhythm

            // Talking/Smile already smoothed inside lipSync.update() — apply directly
            if ('Talking' in dict) infl[dict['Talking']] = blend.t;
            if ('Smile' in dict) infl[dict['Smile']] = blend.s;

            // ③ Eye blink (same morph data on all meshes)
            if ('EyeBlink' in dict) {
              infl[dict['EyeBlink']] = THREE.MathUtils.lerp(
                infl[dict['EyeBlink']], blinkW, 0.35
              );
            }

            // ④ Specific viseme shape key → fine lip-form detail on top
            for (const [k, idx] of Object.entries(dict)) {
              if (!k.startsWith('viseme_')) continue;
              const w = (k === tgtName) ? 1.0 : 0.0;
              infl[idx] = THREE.MathUtils.lerp(infl[idx], w, LERP);
            }
          }

          // Debug: first non-silence hit
          const firstMesh = glbFaceMeshes[0];
          if (speaking && curV !== 'X' && !firstMesh._dbgLogged) {
            firstMesh._dbgLogged = true;
            console.log('🎤 Viseme:', curV, '→', tgtName,
              `Talking=${blend.t} Smile=${blend.s}`,
              '| meshes:', glbFaceMeshes.length);
          }
          if (!speaking) firstMesh._dbgLogged = false;
        }
      }

      renderer.render(scene, camera);
    }
    animate();

    // ════════════════════════════════════════════
    //  UI
    // ════════════════════════════════════════════
    const btn = document.getElementById("speak-btn");
    const micBtn = document.getElementById("mic-btn");
    const liveBtn = document.getElementById("live-btn");
    const input = document.getElementById("text-input");
    const status = document.getElementById("status");
    const waveform = document.getElementById("waveform");
    const transcriptEl = document.getElementById("transcript-messages");

    let conversationHistory = [];
    let currentFinishSpeaking = null;   // lets us interrupt mid-speech
    let liveMode = false;

    // ── Transcript UI ──
    function addTranscriptMessage(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + (role === "user" ? "msg-user" : "msg-chloe");
      div.textContent = text;
      transcriptEl.appendChild(div);
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    // ── Make Chloe speak (interruptible) ──
    async function makeChloeSpeak(text) {
      status.textContent = "Generating speech...";
      waveform.classList.remove("active");

      const res = await fetch("http://127.0.0.1:8000/speak", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();
      lipSync.schedule = data.visemes;

      if (lipSync.audio) { lipSync.audio.pause(); lipSync.audio = null; }

      const audio = new Audio("http://127.0.0.1:8000" + data.audio_url + "?t=" + Date.now());
      lipSync.audio = audio;

      let fallbackMs = 8000;
      if (data.visemes && data.visemes.length > 0) {
        const lastCue = data.visemes[data.visemes.length - 1];
        fallbackMs = Math.max(500, (lastCue.end * 1000) + 800);
      }

      return new Promise((resolve) => {
        let finished = false;
        const finish = () => {
          if (finished) return;
          finished = true;
          lipSync.schedule = [];
          lipSync.tgtV = 'X';
          lipSync.cur = { t: 0, s: 0 };
          lipSync.target = { t: 0, s: 0 };
          status.textContent = liveMode ? "Listening..." : "Ready";
          waveform.classList.remove("active");
          currentFinishSpeaking = null;
          resolve();
        };
        currentFinishSpeaking = finish;

        audio.onended = finish;
        audio.onerror = finish;
        setTimeout(finish, fallbackMs);

        status.textContent = "Speaking...";
        waveform.classList.add("active");
        audio.play().catch(() => finish());
      });
    }

    // Stop Chloe immediately — used for interrupts
    function interruptChloe() {
      if (lipSync.audio) lipSync.audio.pause();
      if (currentFinishSpeaking) currentFinishSpeaking();
    }

    // ── Send user text through the AI brain, then speak the reply ──
    async function sendToChloe(userText) {
      if (!userText) return;
      btn.disabled = true;
      if (!liveMode) micBtn.disabled = true;
      status.textContent = "Chloe is thinking...";
      addTranscriptMessage("user", userText);

      try {
        const res = await fetch("http://127.0.0.1:8000/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: userText, history: conversationHistory }),
        });
        const data = await res.json();

        if (data.error) {
          status.textContent = "Error: " + data.error;
          return;
        }

        conversationHistory.push({ role: "user", content: userText });
        conversationHistory.push({ role: "assistant", content: data.reply });
        addTranscriptMessage("chloe", data.reply);

        await makeChloeSpeak(data.reply);

      } catch (e) {
        console.error(e);
        status.textContent = "Error — is the backend running?";
      } finally {
        btn.disabled = false;
        if (!liveMode) micBtn.disabled = false;
      }
    }

    // ── Text input → Speak button ──
    btn.addEventListener("click", () => {
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      sendToChloe(text);
    });
    input.addEventListener("keydown", e => { if (e.key === "Enter") btn.click(); });

    // ── Manual hold-to-talk mic (used when Live Mode is off) ──
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;

    async function startRecording() {
      if (liveMode) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(audioChunks, { type: "audio/webm" });
          status.textContent = "Transcribing...";
          const formData = new FormData();
          formData.append("audio", blob, "mic_input.webm");
          try {
            const res = await fetch("http://127.0.0.1:8000/transcribe", { method: "POST", body: formData });
            const data = await res.json();
            if (data.text && data.text.trim()) {
              input.value = data.text;
              sendToChloe(data.text);
            } else {
              status.textContent = "Didn't catch that — try again";
            }
          } catch (e) {
            console.error(e);
            status.textContent = "Transcription error";
          }
        };
        mediaRecorder.start();
        isRecording = true;
        micBtn.classList.add("recording");
        status.textContent = "Listening...";
      } catch (e) {
        console.error(e);
        status.textContent = "Mic access denied";
      }
    }
    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        micBtn.classList.remove("recording");
      }
    }
    micBtn.addEventListener("mousedown", startRecording);
    micBtn.addEventListener("mouseup", stopRecording);
    micBtn.addEventListener("mouseleave", () => { if (isRecording) stopRecording(); });
    micBtn.addEventListener("touchstart", e => { e.preventDefault(); startRecording(); });
    micBtn.addEventListener("touchend", e => { e.preventDefault(); stopRecording(); });

    // ════════════════════════════════════════════
    //  LIVE MODE — continuous listening + auto turn-taking + interrupt
    // ════════════════════════════════════════════
    let vadStream = null;
    let audioCtx = null;
    let analyser = null;
    let vadData = null;
    let vadRafId = null;
    let vadState = 'idle';        // 'idle' | 'user_speaking'
    let speechFrames = 0;
    let silenceFrames = 0;
    let liveRecorder = null;
    let liveChunks = [];

    const VAD_THRESHOLD = 0.025;  // mic sensitivity — raise if it triggers on background noise
    const VAD_SPEECH_FRAMES = 4;      // consecutive loud frames to confirm "user started talking"
    const VAD_SILENCE_FRAMES = 50;     // consecutive quiet frames to confirm "user stopped talking" (~800ms)

    async function startLiveMode() {
      try {
        vadStream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
        });
      } catch (e) {
        console.error(e);
        status.textContent = "Mic access denied";
        return;
      }

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(vadStream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      source.connect(analyser);
      vadData = new Uint8Array(analyser.frequencyBinCount);

      liveMode = true;
      micBtn.disabled = true;
      liveBtn.classList.add("active");
      liveBtn.textContent = "⏹ Stop Live Conversation";
      status.textContent = "Live mode on — listening...";

      vadLoop();
    }

    function stopLiveMode() {
      liveMode = false;
      vadState = 'idle';
      if (vadRafId) cancelAnimationFrame(vadRafId);
      if (liveRecorder && liveRecorder.state !== 'inactive') liveRecorder.stop();
      if (vadStream) vadStream.getTracks().forEach(t => t.stop());
      if (audioCtx) audioCtx.close();
      micBtn.disabled = false;
      liveBtn.classList.remove("active");
      liveBtn.textContent = "🔴 Start Live Conversation";
      status.textContent = "Ready";
    }

    function vadLoop() {
      if (!liveMode) return;
      analyser.getByteTimeDomainData(vadData);

      let sumSq = 0;
      for (let i = 0; i < vadData.length; i++) {
        const v = (vadData[i] - 128) / 128;
        sumSq += v * v;
      }
      const rms = Math.sqrt(sumSq / vadData.length);

      // Higher bar to "interrupt" while Chloe is talking — reduces false
      // triggers from her own voice leaking into the mic via speakers.
      const chloeSpeaking = lipSync.audio && !lipSync.audio.paused;
      const threshold = chloeSpeaking ? VAD_THRESHOLD * 2.3 : VAD_THRESHOLD;

      if (rms > threshold) { speechFrames++; silenceFrames = 0; }
      else { silenceFrames++; speechFrames = 0; }

      if (vadState === 'idle' && speechFrames >= VAD_SPEECH_FRAMES) {
        onUserStartSpeaking();
      } else if (vadState === 'user_speaking' && silenceFrames >= VAD_SILENCE_FRAMES) {
        onUserStopSpeaking();
      }

      vadRafId = requestAnimationFrame(vadLoop);
    }

    function onUserStartSpeaking() {
      vadState = 'user_speaking';
      status.textContent = "Listening...";

      if (lipSync.audio && !lipSync.audio.paused) {
        interruptChloe();   // barge-in
      }

      liveChunks = [];
      liveRecorder = new MediaRecorder(vadStream);
      liveRecorder.ondataavailable = e => liveChunks.push(e.data);
      liveRecorder.onstop = handleLiveRecordingStop;
      liveRecorder.start();
    }

    function onUserStopSpeaking() {
      vadState = 'idle';
      if (liveRecorder && liveRecorder.state !== 'inactive') liveRecorder.stop();
    }

    async function handleLiveRecordingStop() {
      const blob = new Blob(liveChunks, { type: "audio/webm" });
      if (blob.size < 2000) {                       // too short — probably noise
        status.textContent = liveMode ? "Listening..." : "Ready";
        return;
      }

      status.textContent = "Transcribing...";
      const formData = new FormData();
      formData.append("audio", blob, "live_input.webm");

      try {
        const res = await fetch("http://127.0.0.1:8000/transcribe", { method: "POST", body: formData });
        const data = await res.json();
        if (data.text && data.text.trim()) {
          await sendToChloe(data.text);
        } else {
          status.textContent = liveMode ? "Listening..." : "Ready";
        }
      } catch (e) {
        console.error(e);
        status.textContent = "Transcription error";
      }
    }

    liveBtn.addEventListener("click", () => {
      if (liveMode) stopLiveMode(); else startLiveMode();
    });

  </script>
</body>

</html>
